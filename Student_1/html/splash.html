<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Linking the external CSS file for the Splash screen -->
    <link rel="stylesheet" href="../css/Splash.css">
    <!-- Character encoding set to UTF-8 for proper text rendering -->
    <meta charset="UTF-8">
    <!-- Viewport meta tag to make the page responsive on different devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title of the page displayed in the browser tab -->
    <title>Splash Screen</title>
    <!-- Auto Redirect to Home Page after 5 seconds -->
    <meta http-equiv="refresh" content="5; url=home.html">
    <!-- Linking a global CSS file for overall styling -->
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <div>
        <!-- Main header with a welcome message -->
        <h1>Welcome to Life Below Water</h1>
        <!-- Subtitle or description of the project or purpose -->
        <h2>Preserving Our Oceans</h2>
        <!-- Paragraph describing the mission of the project -->
        <p class="mission">Raising awareness and promoting sustainable actions to protect marine life and ensure a healthier future for our oceans.</p>
        <!-- Header displaying group members -->
        <h3><b><u>Group Members</u></b></h3>
        <!-- Unordered list displaying the names of the group members -->
        <ul class="no-bullets">
            <li>Dahamsee Kasthuriarachchi</li>
            <li>Manasi Prabavi</li>
            <li>Amra Nasar</li>
            <li>Samathi Chithma</li>
        </ul>
        <!-- Header for a loading message -->
        <h3 class="load">Loading... Please wait</h3>
        <!-- Button that links to the page editor, clicking it takes the user to 'pgeditor.html' -->
        <button class="page-editor" onclick="window.location.href='pgeditor.html' ">Page Editor</button>
    </div>
</body>
</html>
